# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name cybexsoft.com www.cybexsoft.com;

    return 301 https://$host$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    server_name cybexsoft.com www.cybexsoft.com;

    #root /var/www/cybexsoft.com;
    #index index.php index.html index.htm;

    location / {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL Certificates (after Certbot issues them)
    ssl_certificate     /etc/letsencrypt/live/cybexsoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cybexsoft.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/cybexsoft.access.log;
    error_log /var/log/nginx/cybexsoft.error.log;

    # WordPress / PHP CMS permalinks
    #location / {
    #    try_files $uri $uri/ /index.php?$args;
    #}

    # PHP-FPM (change version if needed)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block sensitive files
    location ~* /(?:\.htaccess|\.git|\.svn|\.project|LICENSE|README) {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 30d;
        log_not_found off;
    }
}

